<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
  <meta name="author" content="KSH">
  <title>HaPK XO</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="alternate icon" href="favicon.ico" />

  <link href="lib/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">

  <script src="coi-serviceworker.js"></script>
  <script src="lib/jquery-3.6.1.min.js" defer></script>
  <script src="lib/bootstrap.min.js" defer></script>

  <script src="scripts.js" defer></script>
  <script src="brain/brain.js" defer></script>
</head>

<body>
  <header class="topbar">
    <span class="brand">HaPK <em>XO</em></span>
  </header>

  <div class="app">

    <aside class="sidebar">

      <div class="card">
        <div class="card-h">Bot</div>
        <div class="card-b">
          <section class="ai-selector">
            <div>
              <input type="radio" id="ai_kei" name="ai-select" value="0" checked>
              <label for="ai_kei">
                <img class="bot-avatar" src="avatar-tumay.jpg" alt="Tư Mã Ý" />
                <span class="op-title">Tư Mã Ý</span>
                <span class="op-desc">Ẩn nhẫn mưu sâu</span>
              </label>
            </div>
            <div>
              <input type="radio" id="ai_kei2" name="ai-select" value="0">
              <label for="ai_kei2">
                <img class="bot-avatar" src="avatar-giacat.jpg" alt="Gia Cát Lượng" />
                <span class="op-title">Gia Cát Lượng</span>
                <span class="op-desc">Ngọa Long tiên sinh</span>
              </label>
            </div>
          </section>
        </div>
      </div>

      <div class="card" style="display:none">
        <div class="card-h">Difficulty</div>
        <div class="card-b">
          <div id="div_level" class="ai-level">
            <input type="radio" name="ai-level" id="lv1" value="0" />
            <label for="lv1">Chicken</label>
            <input type="radio" name="ai-level" id="lv2" value="1" />
            <label for="lv2">Easy</label>
            <input type="radio" name="ai-level" id="lv3" value="2" />
            <label for="lv3">Normal</label>
            <input type="radio" name="ai-level" id="lv4" value="3" />
            <label for="lv4">Medium</label>
            <input type="radio" name="ai-level" id="lv5" value="4" />
            <label for="lv5">Hard</label>
            <input type="radio" name="ai-level" id="lv6" value="5" checked="checked" />
            <label for="lv6">Fuck!</label>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-h">Who goes first</div>
        <div class="card-b">
          <div class="ai-level">
            <input type="radio" name="play-first" id="ai_first" value="0" checked="checked" />
            <label for="ai_first">Bot</label>
            <input type="radio" name="play-first" id="human_first" value="1" />
            <label for="human_first">Human</label>
          </div>
        </div>
      </div>

    </aside>

    <main class="main">
      <div id="panel_gamearea" class="board-wrap">
        <div id="div_gamearea">
          <table id="tbl_board"></table>
        </div>
        <div id="board_overlay">
          <button id="btn_start" type="button" class="btn btn-primary btn-start-overlay" disabled="disabled">
            Start Game
          </button>
        </div>
      </div>

      <div class="controls board-controls">
        <button id="btn_restart" type="button" class="btn btn-primary" disabled="disabled">Restart</button>
        <button id="btn_undo" type="button" class="btn btn-default" style="display:none" disabled="disabled">Undo</button>
        <button id="btn_showmoves" type="button" style="display:none" class="btn btn-default">Show Moves</button>
        <button id="btn_prevmove" type="button" style="display:none" class="btn btn-default">&lt;&lt;</button>
        <button id="btn_nextmove" type="button" style="display:none" class="btn btn-default">&gt;&gt;</button>
      </div>
    </main>

    <aside class="sidebar sidebar-right">
      <div class="card">
        <div class="card-h">Status</div>
        <div id="panel_status" class="card-b">
          <div id="game_status">Pick options, then Start.</div>
          <div id="div_pb_outer" class="progress">
            <div id="div_pb_inner" class="progress-bar" role="progressbar" aria-valuenow="60" aria-valuemin="0"
              aria-valuemax="100"></div>
          </div>
          <div id="ai_msg">Hello!</div>
          <textarea id="ai_logs">No logs</textarea>
        </div>
      </div>
    </aside>

  </div>
</body>

</html>
